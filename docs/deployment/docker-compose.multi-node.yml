# ============================================================================
# NZBDAV Multi-Node Reference Deployment
# ============================================================================
#
# WHAT THIS IS
#   A horizontally-scaled deployment with separate streaming and ingest roles,
#   shared Postgres, and a single HAProxy ingress doing consistent-hash URI
#   routing across the streaming nodes. Good for 3-10 concurrent users.
#
# WHAT THIS IS NOT
#   Highly available. The HAProxy container below is a single point of
#   failure. If HAProxy crashes and Docker fails to restart it, the entire
#   deployment becomes unreachable until you intervene. Similarly, the
#   single ingest node and single Postgres instance are SPOFs.
#
#   For true HA at the ingress layer, read docs/deployment/ha-load-balancing.md
#   before taking this to production. It covers three options:
#
#     A) Active-passive HAProxy with keepalived + VRRP (on-prem, two hosts)
#     B) External cloud load balancer (AWS ALB, GCP LB, Cloudflare, etc.)
#     C) Accept the SPOF with Docker restart policies (the default here)
#
#   Most self-hosted hobby users should stay on Option C and just add
#   `restart: unless-stopped` on every service below (it's already set on
#   haproxy to harden against container crashes).
# ============================================================================

version: "3.9"

services:
  nzbdav-stream-1:
    image: nzbdav:latest
    restart: unless-stopped
    environment:
      NZBDAV_ROLE: streaming
      DATABASE_URL: Host=postgres;Database=nzbdav;Username=nzbdav;Password=nzbdav
      FRONTEND_BACKEND_API_KEY: ${FRONTEND_BACKEND_API_KEY}
      NZBDAV_L2_ACCESS_KEY: ${MINIO_ROOT_USER:-nzbdav}
      NZBDAV_L2_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CONFIG_PATH: /config
      ASPNETCORE_URLS: http://0.0.0.0:8080
    volumes:
      - nzbdav-stream-1-config:/config
    depends_on:
      - postgres
      - minio
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      # First-boot budget: EF Core migrations (Database.EnsureCreatedAsync
      # or explicit --db-migration) can exceed 60s on a cold Postgres,
      # especially when the schema gets expanded by the multi-node
      # hardening tables. Conservative 180s means a slow first boot
      # doesn't mark the container unhealthy and kick it into a
      # Docker-restart loop before migrations finish. After first boot
      # the health check is evaluated normally at 10s intervals.
      start_period: 180s

  nzbdav-stream-2:
    image: nzbdav:latest
    restart: unless-stopped
    environment:
      NZBDAV_ROLE: streaming
      DATABASE_URL: Host=postgres;Database=nzbdav;Username=nzbdav;Password=nzbdav
      FRONTEND_BACKEND_API_KEY: ${FRONTEND_BACKEND_API_KEY}
      NZBDAV_L2_ACCESS_KEY: ${MINIO_ROOT_USER:-nzbdav}
      NZBDAV_L2_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CONFIG_PATH: /config
      ASPNETCORE_URLS: http://0.0.0.0:8080
    volumes:
      - nzbdav-stream-2-config:/config
    depends_on:
      - postgres
      - minio
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      # First-boot budget: EF Core migrations (Database.EnsureCreatedAsync
      # or explicit --db-migration) can exceed 60s on a cold Postgres,
      # especially when the schema gets expanded by the multi-node
      # hardening tables. Conservative 180s means a slow first boot
      # doesn't mark the container unhealthy and kick it into a
      # Docker-restart loop before migrations finish. After first boot
      # the health check is evaluated normally at 10s intervals.
      start_period: 180s

  nzbdav-ingest:
    image: nzbdav:latest
    restart: unless-stopped
    environment:
      NZBDAV_ROLE: ingest
      DATABASE_URL: Host=postgres;Database=nzbdav;Username=nzbdav;Password=nzbdav
      FRONTEND_BACKEND_API_KEY: ${FRONTEND_BACKEND_API_KEY}
      NZBDAV_L2_ACCESS_KEY: ${MINIO_ROOT_USER:-nzbdav}
      NZBDAV_L2_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CONFIG_PATH: /config
      ASPNETCORE_URLS: http://0.0.0.0:8080
    volumes:
      - nzbdav-ingest-config:/config
    depends_on:
      - postgres
      - minio
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      # First-boot budget: EF Core migrations (Database.EnsureCreatedAsync
      # or explicit --db-migration) can exceed 60s on a cold Postgres,
      # especially when the schema gets expanded by the multi-node
      # hardening tables. Conservative 180s means a slow first boot
      # doesn't mark the container unhealthy and kick it into a
      # Docker-restart loop before migrations finish. After first boot
      # the health check is evaluated normally at 10s intervals.
      start_period: 180s

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: nzbdav
      POSTGRES_USER: nzbdav
      POSTGRES_PASSWORD: nzbdav
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nzbdav"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nzbdav}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 3

  haproxy:
    image: haproxy:3.1
    # restart: unless-stopped is the MINIMUM mitigation for the SPOF documented
    # in the banner above. This only helps against container/process crashes.
    # It does NOT protect against host failure, kernel panic, or network
    # partition. For real HA see docs/deployment/ha-load-balancing.md.
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - nzbdav-stream-1
      - nzbdav-stream-2
      - nzbdav-ingest
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'show stat' | socat stdio /var/run/haproxy.sock || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nzbdav-stream-1-config:
  nzbdav-stream-2-config:
  nzbdav-ingest-config:
  postgres-data:
  minio-data:
