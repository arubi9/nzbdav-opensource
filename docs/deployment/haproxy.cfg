global
    maxconn 4096

defaults
    mode http
    timeout connect 5s
    timeout client 300s
    timeout server 300s
    option httplog

frontend http_front
    bind *:8080

    acl is_addfile path_beg /api
    acl is_addfile_mode urlp(mode) -i addfile addurl
    use_backend ingest if is_addfile is_addfile_mode

    default_backend streaming

backend streaming
    balance uri
    hash-type consistent
    # /ready returns 503 when the node is saturated (cache >90% or NNTP pool
    # >90% or provider unhealthy). /health stays 200 even during Degraded —
    # it's the diagnostic endpoint, not the backpressure one. Using /ready
    # here so HAProxy drains an overloaded node while the underlying NZBDAV
    # process is still technically responsive.
    option httpchk GET /ready
    http-check expect status 200
    server stream1 nzbdav-stream-1:8080 check inter 2s fall 2 rise 2
    server stream2 nzbdav-stream-2:8080 check inter 2s fall 2 rise 2

backend ingest
    option httpchk GET /ready
    http-check expect status 200
    server ingest1 nzbdav-ingest:8080 check inter 2s fall 2 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
