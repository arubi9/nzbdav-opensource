<!DOCTYPE html>
<html>
<head>
    <title>NZBDAV</title>
</head>
<body>
    <div id="configPage" data-role="page" class="page type-interior pluginConfigurationPage configPage" data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <h1>NZBDAV</h1>
                <form class="configForm">
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="nzbdavBaseUrl" label="NZBDAV Base URL" />
                        <div class="fieldDescription">Example: http://localhost:8080</div>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="apiKey" label="API Key" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="timeoutSeconds" label="Timeout Seconds" min="1" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="libraryPath" label="Library Path" />
                        <div class="fieldDescription">Directory for .strm files. Add this path as a Jellyfin library (Movies or TV).</div>
                    </div>
                    <br />
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var PluginConfig = {
                pluginId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            };

            document.querySelector(".configPage")
                .addEventListener("pageshow", function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        document.querySelector("#nzbdavBaseUrl").value = config.NzbdavBaseUrl || "";
                        document.querySelector("#apiKey").value = config.ApiKey || "";
                        document.querySelector("#timeoutSeconds").value = config.TimeoutSeconds || 30;
                        document.querySelector("#libraryPath").value = config.LibraryPath || "/media/nzbdav";
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector(".configForm")
                .addEventListener("submit", function (e) {
                    Dashboard.showLoadingMsg();

                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        config.NzbdavBaseUrl = document.querySelector("#nzbdavBaseUrl").value;
                        config.ApiKey = document.querySelector("#apiKey").value;
                        config.TimeoutSeconds = parseInt(document.querySelector("#timeoutSeconds").value || "30", 10);
                        config.LibraryPath = document.querySelector("#libraryPath").value;

                        ApiClient.updatePluginConfiguration(PluginConfig.pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
                    });

                    e.preventDefault();
                    return false;
                });
        </script>
    </div>
</body>
</html>
